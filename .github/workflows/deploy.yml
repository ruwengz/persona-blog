name: Deploy Blog

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        
    - name: Install theme
      run: |
        if [ ! -d "themes/mecha" ]; then
          git clone https://github.com/nickyc975/hexo-theme-mecha themes/mecha
        fi
        npm install hexo-deployer-git --save
        
    - name: Configure Git
      run: |
        git config --global user.email "13041936923@163.com"
        git config --global user.name "zxx"
        
    - name: Build website
      run: |
        npx hexo clean
        npx hexo generate
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
