name: Deploy Blog

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        npm install hexo-deployer-git --save
        
    - name: Build website
      run: |
        hexo clean
        hexo generate
        
    - name: Deploy to GitHub Pages
      run: |
        hexo deploy
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
