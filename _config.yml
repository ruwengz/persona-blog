# Hexo Configuration
# https://hexo.io/zh-cn/docs/configuration.html

# Site
title: 机甲之心 | MEKA CORE
subtitle: '探索科技与艺术的边界'
description: '一个热爱机甲、科幻与技术的个人博客'
author: MEKA PILOT
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://yourdomain.com
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: post
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Home page setting
index_generator:
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: mecha

# Deployment
deploy:
  type: git
  repo: https://github.com/ruwengz/persona-blog.git
  branch: gh-pages

# Search
search:
  path: search.xml
  field: post
  format: html
  limit: 10000
